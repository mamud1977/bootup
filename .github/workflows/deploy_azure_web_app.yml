name: Deploy Snowflake Infrastructure

on:
  push:
    branches:
      - main
      - branch1

defaults:
  run:
    working-directory: ./Terraform/Azure/sandbox/app-service
    
jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    env:
      TF_VAR_ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_VAR_ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      TF_VAR_ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: List files in repository
        run: ls -la ${{ github.workspace }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6


      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
        env:   
          TF_VAR_snowflake_account: ${{ secrets.snowflake_account }}
          TF_VAR_snowflake_username: ${{ secrets.snowflake_username }}
          TF_VAR_snowflake_role: ${{ secrets.snowflake_role }}
          TF_VAR_snowflake_private_key: ${{ secrets.snowflake_private_key }}
          
      - name: Terraform Apply
        run: terraform apply -auto-approve
