<style>
    .node {
        border: 1px solid #ccc;
        padding: 8px;
        margin: 6px;
        background: #f9f9f9;
    }

    .children {
        margin-left: 30px;
        /* indent children */
        border-left: 2px dashed #aaa;
        padding-left: 10px;
    }

    .properties {
        margin-left: 20px;
    }
</style>


<div id="eventBuilder">
    <label>Event Name:</label>
    <input type="text" id="eventname" name="eventname" placeholder="Enter event name" required>
</div>


<div id="rootNode"></div>

<button type="button" onclick="addNode('rootNode')">Add Root Node</button>
<button type="button" onclick="saveEvent()">Save Event</button>
<span id="eventResult" style="margin-left:15px; font-weight:bold;"></span>
</div>

<h3>Live Structure Preview</h3>
<pre id="eventPreview"></pre>

<script src="{{ url_for('static', path='js/event_builder.js') }}"></script>

<script>
    {% if event_structure %}
    // Pre-populate builder with existing event JSON
    const existingEvent = {{ event_structure | tojson }};
    document.getElementById("eventname").value = existingEvent.name;

    if (existingEvent.roots && existingEvent.roots.length > 0) {
        const rootContainer = document.getElementById("rootNode");
        existingEvent.roots
            .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))
            .forEach(root => buildExistingNode(rootContainer, root));
    }


    {% endif %}
</script>
